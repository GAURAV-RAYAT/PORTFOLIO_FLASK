name: Run Monitoring Agent

on:
  schedule:
    # Every 2 hours
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monitoring cycle
        env:
          MONITORING_URL: ${{ secrets.MONITORING_URL }}
          MONITOR_RUN_TOKEN: ${{ secrets.MONITOR_RUN_TOKEN }}
        run: |
          if [ -z "$MONITORING_URL" ]; then
            echo "MONITORING_URL secret is required (example: https://gauravrayat.me/api/monitoring/run)"
            exit 1
          fi

          AUTH_HEADER=""
          if [ -n "$MONITOR_RUN_TOKEN" ]; then
            AUTH_HEADER="X-Monitor-Token: $MONITOR_RUN_TOKEN"
          fi

          if [ -n "$AUTH_HEADER" ]; then
            HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST "$MONITORING_URL" \
              -H "$AUTH_HEADER" \
              -H "Content-Type: application/json")
          else
            HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST "$MONITORING_URL" \
              -H "Content-Type: application/json")
          fi

          echo "HTTP Status: $HTTP_CODE"
          cat response.json

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Monitoring trigger failed."
            exit 1
          fi
