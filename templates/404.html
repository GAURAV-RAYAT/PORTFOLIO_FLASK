<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Data Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #ffdb70;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 219, 112, 0.5);
        }

        h2 {
            font-size: 2rem;
            color: #e0e0e0;
            margin-top: -20px;
        }

        p {
            color: #aaa;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            background: transparent;
            border: 2px solid #ffdb70;
            color: #ffdb70;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ffdb70;
            color: #121212;
        }

        .glitch-wrapper {
            position: relative;
        }
    </style>
</head>

<body>
    <div class="glitch-wrapper">
        <h1>404</h1>
    </div>
    <h2>Page Not Found</h2>
    <a href="/" class="btn">Return to Homepage</a>
</body>

</html>
